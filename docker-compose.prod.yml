# tsengine — PRODUCTION single-box stack (docs/production-single-box.md).
#
# Hardened variant of docker-compose.yml: the engine is ON (tech-asset scans run), but the
# platform NEVER holds the raw Docker socket. Instead it reaches the Docker API through a
# restricted docker-socket-proxy (only the container-lifecycle calls it needs), and the
# per-scan sandboxes run on a dedicated isolated network with the P1 hardening knobs on.
#
#   cp .env.example .env            # set TSENGINE_SECRET_KEY + TSENGINE_PLATFORM_TOKEN
#   make sandbox-image              # build tsengine/sandbox:<tag> (the OSS-tool image)
#   docker compose -f docker-compose.prod.yml up --build -d
#
# (P3 adds a TLS edge in front; P4 adds the one-command deploy + backup scripts.)

services:
  # --- TLS edge (threat T7) — the ONLY published surface ---
  # Terminates HTTPS + security headers; routes /v1,/ui,/healthz → platform, the rest →
  # frontend. Default uses Caddy's internal CA (localhost); set TSENGINE_SITE_ADDRESS to a
  # real domain (+ TSENGINE_ACME_EMAIL, drop `tls internal` in the Caddyfile) for public ACME.
  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    environment:
      TSENGINE_SITE_ADDRESS: ${TSENGINE_SITE_ADDRESS:-localhost}
      TSENGINE_ACME_EMAIL: ${TSENGINE_ACME_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data    # provisioned certs (persist across restarts)
      - caddy-config:/config
    networks:
      - edge
    depends_on:
      - platform
      - frontend
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # --- de-privileged Docker API (threat T3) ---
  # The platform spawns sandboxes via THIS, not /var/run/docker.sock. The proxy holds the
  # socket but exposes only a filtered HTTP API on an internal network. Pin a digest in
  # production (DOCKER_SOCKET_PROXY_IMAGE in .env).
  docker-socket-proxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy:latest}
    environment:
      # Allow ONLY what sandbox spawn needs: inspect images, create/start/stop/remove
      # containers, inspect/attach the sandbox network. Everything else stays denied (0).
      CONTAINERS: "1" # GET/inspect containers
      IMAGES: "1"     # inspect the sandbox image (digest)
      NETWORKS: "1"   # attach to the sandbox network
      POST: "1"       # create / start / stop / remove
      # Explicitly deny the dangerous surface (defaults are 0, set for auditability):
      EXEC: "0"
      VOLUMES: "0"
      INFO: "0"
      AUTH: "0"
      SECRETS: "0"
      SWARM: "0"
      NODES: "0"
      SERVICES: "0"
      TASKS: "0"
      CONFIGS: "0"
      SYSTEM: "0"
      PLUGINS: "0"
      DISTRIBUTION: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dockerproxy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  platform:
    build:
      context: .
      dockerfile: docker/platform/Dockerfile
    environment:
      TSENGINE_PLATFORM_TOKEN: ${TSENGINE_PLATFORM_TOKEN:?set TSENGINE_PLATFORM_TOKEN in .env}
      TSENGINE_SECRET_KEY: ${TSENGINE_SECRET_KEY:?set TSENGINE_SECRET_KEY in .env (openssl rand -base64 32)}
      # Local SQLite (ACID) on the named volume by default; set TSENGINE_PLATFORM_DB to a
      # postgres:// DSN in .env (Supabase / RDS / Neon) for managed, multi-node Postgres.
      TSENGINE_PLATFORM_DB: ${TSENGINE_PLATFORM_DB:-/data/platform.db}
      # Engine ON — but via the proxy, NOT a mounted socket:
      TSENGINE_PLATFORM_NO_ENGINE: "0"
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      TSENGINE_SANDBOX_IMAGE: ${TSENGINE_SANDBOX_IMAGE:-tsengine/sandbox:latest}
      # Per-scan sandbox isolation (P1 hardening; docs §5.1). The sandbox joins THIS
      # network (no host port published — the platform reaches it by container IP) and
      # gets a read-only rootfs. Resource/PID/file limits apply by default.
      TSENGINE_SANDBOX_NETWORK: tsengine-sandbox
      TSENGINE_SANDBOX_READONLY: "1"
      TSENGINE_MONITOR_INTERVAL: ${TSENGINE_MONITOR_INTERVAL:-12h}
      TSENGINE_WEBHOOK_SECRET: ${TSENGINE_WEBHOOK_SECRET:-}
      # Public base URL is the TLS edge (OAuth redirect_uri, webhook callbacks).
      TSENGINE_PLATFORM_PUBLIC: ${TSENGINE_PLATFORM_PUBLIC:-https://localhost}
      TSENGINE_LOG_FORMAT: json
      # The public lead-magnet (/v1/assess) rate-limits per CLIENT IP. Behind the Caddy edge the
      # connection's RemoteAddr is Caddy's container IP for ALL traffic, so the limiter must read the
      # real client from X-Forwarded-For — but only for connections from a trusted proxy. The platform
      # port is unpublished (reachable only via Caddy on the private Docker network), so the Docker
      # private ranges are the trusted proxy set. Override if your proxy sits elsewhere.
      TSENGINE_TRUSTED_PROXY_CIDRS: ${TSENGINE_TRUSTED_PROXY_CIDRS:-172.16.0.0/12,10.0.0.0/8,192.168.0.0/16,fc00::/7}
    # No published ports — reachable only via the caddy edge on the internal `edge` network.
    volumes:
      - platform-data:/data
    networks:
      - edge        # ↔ frontend
      - dockerproxy # ↔ docker-socket-proxy (no raw socket here)
      - sandbox     # ↔ the sandboxes it spawns
    depends_on:
      - docker-socket-proxy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      TSENGINE_API_URL: http://platform:8090 # server-side only; the browser never sees it
      NODE_ENV: production
    # No published ports — the browser reaches it only via the caddy TLS edge.
    networks:
      - edge
    depends_on:
      platform:
        condition: service_healthy
    restart: unless-stopped

networks:
  edge: {}
  # The platform↔proxy link carries the Docker API only; no internet egress needed.
  dockerproxy:
    internal: true
  # Dedicated, named (so TSENGINE_SANDBOX_NETWORK is deterministic regardless of the
  # compose project name) bridge for the ephemeral sandboxes. NOT internal — scans need
  # egress to reach customer targets — but it is OFF the frontend network, and the
  # sandbox carries no host port. Residual platform↔sandbox L3 reachability on this
  # bridge is an accepted single-box risk (mitigated by the tool-server bearer token +
  # the P1 sandbox hardening); the strong fix (per-tenant net policy / microVM) is a
  # scale-tier item (docs §6).
  sandbox:
    name: tsengine-sandbox

volumes:
  platform-data:
  caddy-data:   # provisioned TLS certs (internal CA root / ACME)
  caddy-config:
