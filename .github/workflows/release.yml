name: Release

# Cuts a release on a version tag: cross-platform binaries (attached to a GitHub
# Release) + the host service image pushed to GHCR. No extra secrets required —
# image push authenticates with the built-in GITHUB_TOKEN.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to ghcr.io

jobs:
  binaries:
    name: build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Build cross-platform binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${pair%/*}"; arch="${pair#*/}"
            out="tsengine_${VERSION}_${os}_${arch}"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" \
              -o "dist/${out}/tsengine" ./cmd/tsengine
            tar -C "dist/${out}" -czf "dist/${out}.tar.gz" tsengine
          done
          cd dist && sha256sum *.tar.gz > checksums.txt && cat checksums.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  image:
    name: build + push host image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push host image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/host/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/host:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/host:latest
